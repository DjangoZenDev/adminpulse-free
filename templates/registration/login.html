<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AdminPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-indigo-500 text-white mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">AdminPulse</h1>
            <p class="text-slate-400 mt-1">Sign in to your dashboard</p>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 p-8">
            {% if form.errors %}
            <div class="mb-4 p-3 bg-red-900/30 border border-red-800 rounded-lg text-red-400 text-sm">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                    <input type="text" name="username" id="id_username" autofocus
                           class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 text-white rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition placeholder-slate-400"
                           placeholder="Enter your username">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                    <input type="password" name="password" id="id_password"
                           class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 text-white rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition placeholder-slate-400"
                           placeholder="Enter your password">
                </div>
                <button type="submit"
                        class="w-full py-2.5 bg-indigo-500 hover:bg-indigo-600 text-white font-medium rounded-lg transition">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-slate-500 mt-6">Powered by AdminPulse</p>
    </div>
</body>
</html>
